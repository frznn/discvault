name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine .

      - name: Verify generated CLI assets
        run: python scripts/generate_cli_assets.py --check

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  package:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pipx

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate built artifacts
        run: python -m twine check dist/*

      - name: pipx smoke test
        run: |
          python -m pipx install --force dist/*.whl
          "$HOME/.local/bin/discvault" --version
          "$HOME/.local/bin/discvault" --help > /dev/null

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/*
